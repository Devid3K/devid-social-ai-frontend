version: "3.9"

services:
  frontend:
    build:
      context: .
      target: development
    container_name: social-ai-frontend-dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:3000}
      - VITE_SOCKET_URL=${VITE_SOCKET_URL:-http://localhost:3000}
      - VITE_APP_NAME=${VITE_APP_NAME:-devid-social-ai}
