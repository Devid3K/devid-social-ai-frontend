name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build-only
        env:
          VITE_API_URL: https://devid3k.github.io/devid-social-ai-frontend
          VITE_SOCKET_URL: https://devid3k.github.io/devid-social-ai-frontend
          VITE_APP_NAME: devid-social-ai
          VITE_APP_VERSION: 1.0.0

      - name: Copy verification + policy files to dist
        run: |
          cp terms.html dist/ 2>/dev/null || true
          cp privacy.html dist/ 2>/dev/null || true
          cp tiktok*.txt dist/ 2>/dev/null || true
          cp index-gh-pages.html dist/ 2>/dev/null || true

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
